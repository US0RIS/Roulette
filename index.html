<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Roulette</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#5941DC;
    --panel:rgba(20,12,54,0.42);
    --panel-solid:#241a52;
    --gold:#e7c572;
    --gold-2:#f7e3a6;
    --gold-deep:#a9822f;
    --ink:#f4f1ff;
    --muted:#c7bdf5;
    --shadow:0 24px 60px rgba(10,4,40,0.55);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(1200px 800px at 50% -10%, #6d55ec 0%, rgba(109,85,236,0) 55%),
      radial-gradient(900px 700px at 90% 115%, #3f2bb0 0%, rgba(63,43,176,0) 60%),
      var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{ max-width:760px; margin:0 auto; padding:36px 22px 70px; }

  header.top{ text-align:center; margin-bottom:14px; }
  .eyebrow{ letter-spacing:.46em; text-transform:uppercase; font-size:11px; color:var(--gold-2); font-weight:600; margin-bottom:8px; opacity:.9; }
  h1{
    font-family:'Cinzel',serif; font-weight:900; font-size:clamp(30px,5.6vw,56px); margin:0; line-height:1;
    background:linear-gradient(180deg,#fff 0%,var(--gold-2) 55%,var(--gold) 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 3px 0 rgba(0,0,0,.25));
  }
  .sub{color:var(--muted);font-size:13.5px;margin-top:10px}

  /* ---------- Wheel ---------- */
  .wheel-hero{display:flex;flex-direction:column;align-items:center;margin-top:26px}
  .wheel-holder{
    position:relative;width:min(90vw,540px);aspect-ratio:1/1;
  }
  .wheel-holder::before{
    content:"";position:absolute;inset:-6% -6% -9% -6%;border-radius:50%;
    background:radial-gradient(closest-side, rgba(0,0,0,.45), rgba(0,0,0,0) 70%);
    filter:blur(6px);z-index:0;
  }
  canvas#wheel{position:relative;z-index:1;width:100%;height:100%;display:block}

  .result{ margin-top:24px;height:70px;display:flex;align-items:center;justify-content:center;gap:16px; }
  .result .num{
    font-family:'Cinzel',serif;font-weight:900;font-size:42px;line-height:1;
    min-width:82px;height:70px;padding:0 14px;border-radius:15px;display:flex;align-items:center;justify-content:center;
    background:#2a2140;border:2px solid rgba(255,255,255,.12);color:#efe9ff;
    box-shadow:inset 0 2px 6px rgba(0,0,0,.4);transition:all .35s ease;
  }
  .result .num.red{background:linear-gradient(180deg,#e0454d,#b3242c);border-color:#ff8f95;color:#fff}
  .result .num.black{background:linear-gradient(180deg,#2c2c37,#141419);border-color:#5a5a6b;color:#fff}
  .result .num.green{background:linear-gradient(180deg,#25b565,#178048);border-color:#7bf0ab;color:#fff}
  .result .meta{font-size:14px;color:var(--muted);text-align:left;line-height:1.5}
  .result .meta b{color:var(--ink);font-size:16px}

  .controls{display:flex;gap:12px;margin-top:14px;width:min(90vw,540px)}
  .btn{
    appearance:none;border:none;cursor:pointer;font-family:'Inter';font-weight:700;
    border-radius:14px;padding:16px 18px;font-size:15px;letter-spacing:.02em;transition:transform .08s ease,filter .2s ease,opacity .2s;
  }
  .btn:active{transform:translateY(1px)}
  .btn-spin{
    flex:1;color:#3a2a06;text-transform:uppercase;letter-spacing:.16em;
    background:linear-gradient(180deg,var(--gold-2),var(--gold) 60%,var(--gold-deep));
    box-shadow:0 10px 24px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.6);
  }
  .btn-spin:disabled{opacity:.55;cursor:not-allowed;filter:grayscale(.25)}
  .btn-ghost{background:rgba(255,255,255,.08);color:var(--ink);border:1px solid rgba(255,255,255,.14)}
  .icon-btn{width:56px;padding:0;display:flex;align-items:center;justify-content:center;font-size:18px}

  /* ---------- Betting table (kept) ---------- */
  .card{
    background:var(--panel);border:1px solid rgba(255,255,255,0.10);border-radius:22px;
    box-shadow:var(--shadow);backdrop-filter:blur(9px);
  }
  .guide-card{margin-top:40px;padding:20px 22px 24px}
  .guide-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .guide-head h2{font-family:'Cinzel',serif;font-weight:700;font-size:18px;margin:0;color:var(--gold-2)}
  .guide-head .line{flex:1;height:1px;background:linear-gradient(90deg,var(--gold),transparent)}
  .guide-svg{width:100%;border-radius:14px;overflow:hidden;box-shadow:0 14px 30px rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.08)}
  .guide-svg svg{width:100%;height:auto;display:block}

  footer{text-align:center;margin-top:34px;color:var(--muted);font-size:11px;letter-spacing:.08em}
</style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <h1>Roulette</h1>
    </header>

    <div class="wheel-hero">
      <div class="wheel-holder">
        <canvas id="wheel" width="1080" height="1080"></canvas>
      </div>

      <div class="result">
        <div class="num" id="resultNum">—</div>
        <div class="meta" id="resultMeta">Ready to spin</div>
      </div>

      <div class="controls">
        <button class="btn btn-spin" id="spinBtn">Spin</button>
        <button class="btn btn-ghost icon-btn" id="muteBtn" title="Sound">🔊</button>
      </div>
    </div>

    <section class="card guide-card">
      <div class="guide-head"><h2>Betting Table</h2><div class="line"></div></div>

.4 2.3-2.4 2.7-3l1-1.5.2-1.5c0-.8-.2-1.3-.6-1.7a2.4 2.4 0 0 0-1.7-.5 4.8 4.8 0 0 0-2 .5c-.9.3-1.6.8-2.3 1.4l-2.1-2.6a14.4 14.4 0 0 1 2.3-1.7 8.5 8.5 0 0 1 2-.7 10.3 10.3 0 0 1 2.4-.3 7.2 7.2 0 0 1 3.2.7 5 5 0 0 1 2 1.8c.6.8.8 1.7.8 2.6a6.5 6.5 0 0 1-.4 2.5 9.5 9.5 0 0 1-1.5 2.3c-.6.8-1.7 2-3.4 3.5l-2.4 2.2v.2h8.2v3.4Z"/></g></g><defs><clipPath id="a"><path fill="#fff" d="M0 400V0h800v400z"/></clipPath><clipPath id="c"><path fill="#fff" d="M41.3 365V35h717.4v330z"/></clipPath><linearGradient id="b" x1="630.2" x2="-193.8" y1="317.7" y2="-105.5" gradientUnits="userSpaceOnUse"><stop stop-color="#4529D9"/><stop offset="1" stop-color="#634EDE"/></linearGradient></defs></svg></div>
    </section>

    <footer>For entertainment only</footer>
  </div>

<script>
(() => {
  "use strict";

  /* ===== American double-zero wheel — pocket order & colors ===== */
  const WHEEL = [0,28,9,26,30,11,7,20,32,17,5,22,34,15,3,24,36,13,1,'00',
                 27,10,25,29,12,8,19,31,18,6,21,33,16,4,23,35,14,2];
  const N = WHEEL.length;                 // 38
  const STEP = (Math.PI*2)/N;
  const TAU = Math.PI*2;
  const RED = new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);
  const colorOf = v => (v===0||v==='00') ? 'green' : (RED.has(v) ? 'red' : 'black');
  const PCOL = { red:'#c1272d', black:'#211f24', green:'#1f8f4e' };

  /* ===== Wheel geometry (fractions of outer radius R) ===== */
  const F = {
    goldOutA:0.995, goldOutB:0.85,
    woodA:0.85,     woodB:0.63,
    diamondR:0.74,
    lipA:0.63,      lipB:0.602,
    pocketOut:0.602, pocketIn:0.44,
    numR:0.523,
    goldInA:0.44,   goldInB:0.412,
    coneOut:0.412,
    turretR:0.15,
    ballTrack:0.616, ballRest:0.543,
    ballSize:0.026
  };

  /* ===== Canvas (HiDPI) ===== */
  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  let CSS=540, R=256, cx=270, cy=270;
  function sizeCanvas(){
    const rect = canvas.getBoundingClientRect();
    CSS = rect.width || 540;
    const dpr = Math.min(window.devicePixelRatio||1, 2.5);
    canvas.width = Math.round(CSS*dpr);
    canvas.height = Math.round(CSS*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
    cx = CSS/2; cy = CSS/2; R = CSS*0.485;
  }

  /* ===== State ===== */
  let wheelAngle = -Math.PI/2;
  let ballAngle  = -Math.PI/2;
  let ballRadFrac = F.ballTrack;
  let spinning = false;
  let anim = null;
  let winnerIndex = -1;
  let pulse = 0;

  let riggedIndex = null;   // silent rig target (index into WHEEL)
  let rigBuffer = '';

  /* ===== Drawing helpers ===== */
  function annulus(rOut,rIn,fill){
    ctx.beginPath();
    ctx.arc(0,0,rOut,0,TAU);
    ctx.arc(0,0,rIn,0,TAU,true);
    ctx.fillStyle=fill; ctx.fill('evenodd');
  }
  function disc(r,fill){ ctx.beginPath(); ctx.arc(0,0,r,0,TAU); ctx.fillStyle=fill; ctx.fill(); }

  function draw(){
    ctx.clearRect(0,0,CSS,CSS);
    ctx.save();
    ctx.translate(cx,cy);

    /* ---- STATIC BOWL ---- */
    // dark outer edge
    disc(R, '#141013');

    // bright gold outer ring (beveled)
    let g = ctx.createRadialGradient(0,0,R*F.goldOutB,0,0,R*F.goldOutA);
    g.addColorStop(0,'#7a5410'); g.addColorStop(.28,'#c9971a'); g.addColorStop(.55,'#ffe98a');
    g.addColorStop(.8,'#f0c74a'); g.addColorStop(1,'#6e4c0e');
    annulus(R*F.goldOutA, R*F.goldOutB, g);
    // thin dark separators on the gold ring
    ctx.lineWidth=Math.max(1,R*0.004); ctx.strokeStyle='rgba(40,25,0,.55)';
    ctx.beginPath(); ctx.arc(0,0,R*F.goldOutB,0,TAU); ctx.stroke();

    // wooden ring (raised bevel)
    g = ctx.createRadialGradient(0,0,R*F.woodB,0,0,R*F.woodA);
    g.addColorStop(0,'#4a2c14'); g.addColorStop(.35,'#7c4a22'); g.addColorStop(.62,'#8f582b');
    g.addColorStop(.85,'#6b3d1c'); g.addColorStop(1,'#3f2410');
    annulus(R*F.woodA, R*F.woodB, g);

    // faint segment spokes across the wood ring (8 sectors)
    ctx.lineWidth=Math.max(1,R*0.006); ctx.strokeStyle='rgba(30,16,6,.5)';
    for(let k=0;k<8;k++){
      const a=k*(TAU/8)+TAU/16;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*R*F.woodB, Math.sin(a)*R*F.woodB);
      ctx.lineTo(Math.cos(a)*R*F.woodA, Math.sin(a)*R*F.woodA);
      ctx.stroke();
    }

    // 8 gold diamond deflectors
    for(let k=0;k<8;k++){
      const a=k*(TAU/8)+TAU/16;
      ctx.save();
      ctx.rotate(a); ctx.translate(R*F.diamondR,0);
      const L=R*0.058, W=R*0.032;
      const dg=ctx.createLinearGradient(-L,0,L,0);
      dg.addColorStop(0,'#8a6413'); dg.addColorStop(.5,'#ffe98a'); dg.addColorStop(1,'#a9781f');
      ctx.beginPath();
      ctx.moveTo(L,0); ctx.lineTo(0,W); ctx.lineTo(-L,0); ctx.lineTo(0,-W); ctx.closePath();
      ctx.fillStyle=dg; ctx.fill();
      ctx.lineWidth=Math.max(1,R*0.005); ctx.strokeStyle='#5a3d0a'; ctx.stroke();
      ctx.restore();
    }

    // dark apron / ball track (where the ball whirls)
    g = ctx.createRadialGradient(0,0,R*F.lipB,0,0,R*F.lipA);
    g.addColorStop(0,'#0f0b09'); g.addColorStop(.5,'#3a2a1a'); g.addColorStop(1,'#120c08');
    annulus(R*F.lipA, R*F.lipB, g);
    // gold beading on inner edge of apron
    ctx.lineWidth=Math.max(1,R*0.006); ctx.strokeStyle='#d9b25a';
    ctx.beginPath(); ctx.arc(0,0,R*F.lipB,0,TAU); ctx.stroke();

    /* ---- ROTOR (spins) ---- */
    ctx.save();
    ctx.rotate(wheelAngle);

    const pOut=R*F.pocketOut, pIn=R*F.pocketIn;
    for(let i=0;i<N;i++){
      const a0 = i*STEP - STEP/2, a1 = a0 + STEP;
      ctx.beginPath();
      ctx.arc(0,0,pOut,a0,a1);
      ctx.arc(0,0,pIn,a1,a0,true);
      ctx.closePath();
      ctx.fillStyle = PCOL[colorOf(WHEEL[i])];
      ctx.fill();
      if(i===winnerIndex && !spinning){
        ctx.save(); ctx.globalAlpha=0.30+0.30*Math.sin(pulse); ctx.fillStyle='#ffe9a8'; ctx.fill(); ctx.restore();
      }
      // gold fret separators
      ctx.beginPath();
      ctx.moveTo(Math.cos(a0)*pIn, Math.sin(a0)*pIn);
      ctx.lineTo(Math.cos(a0)*pOut, Math.sin(a0)*pOut);
      ctx.strokeStyle='#e4c368'; ctx.lineWidth=Math.max(1,R*0.005); ctx.stroke();
    }

    // numbers (radial, top pointing outward)
    const numR=R*F.numR;
    ctx.font=`700 ${Math.round(R*0.05)}px Inter, sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle='#fff';
    for(let i=0;i<N;i++){
      const a=i*STEP;
      ctx.save(); ctx.rotate(a); ctx.translate(numR,0); ctx.rotate(Math.PI/2);
      ctx.fillText(String(WHEEL[i]),0,0);
      ctx.restore();
    }

    // inner gold ring
    g = ctx.createRadialGradient(0,0,R*F.goldInB,0,0,R*F.goldInA);
    g.addColorStop(0,'#8a6413'); g.addColorStop(.5,'#ffe98a'); g.addColorStop(1,'#8a6413');
    annulus(R*F.goldInA, R*F.goldInB, g);

    // central cone (raised)
    const coneR=R*F.coneOut;
    g = ctx.createRadialGradient(0,-coneR*0.15,coneR*0.05,0,0,coneR);
    g.addColorStop(0,'#a9713a'); g.addColorStop(.5,'#7c4a22'); g.addColorStop(.85,'#5a3418'); g.addColorStop(1,'#3f2410');
    disc(coneR, g);
    // faint facet spokes on the cone
    ctx.lineWidth=Math.max(1,R*0.004); ctx.strokeStyle='rgba(30,16,6,.35)';
    for(let k=0;k<16;k++){
      const a=k*(TAU/16);
      ctx.beginPath(); ctx.moveTo(0,0);
      ctx.lineTo(Math.cos(a)*coneR, Math.sin(a)*coneR); ctx.stroke();
    }

    // turret (gold spider handle) — spins with rotor
    const tR=R*F.turretR;
    ctx.save();
    // arm shadow
    ctx.strokeStyle='rgba(0,0,0,.35)'; ctx.lineCap='round';
    for(let k=0;k<5;k++){
      const a=k*(TAU/5)-Math.PI/2;
      ctx.lineWidth=R*0.03;
      ctx.beginPath(); ctx.moveTo(0,0);
      ctx.lineTo(Math.cos(a)*tR*1.02, Math.sin(a)*tR*1.02); ctx.stroke();
    }
    // gold arms + ball tips
    for(let k=0;k<5;k++){
      const a=k*(TAU/5)-Math.PI/2;
      const ex=Math.cos(a)*tR, ey=Math.sin(a)*tR;
      const ag=ctx.createLinearGradient(0,0,ex,ey);
      ag.addColorStop(0,'#ffe98a'); ag.addColorStop(1,'#9a7320');
      ctx.strokeStyle=ag; ctx.lineWidth=R*0.022; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(ex,ey); ctx.stroke();
      const bg=ctx.createRadialGradient(ex-tR*0.06,ey-tR*0.06,tR*0.01,ex,ey,tR*0.16);
      bg.addColorStop(0,'#fff6d0'); bg.addColorStop(.6,'#f0c74a'); bg.addColorStop(1,'#8a6413');
      ctx.beginPath(); ctx.arc(ex,ey,tR*0.16,0,TAU); ctx.fillStyle=bg; ctx.fill();
    }
    // central hub
    const hg=ctx.createRadialGradient(-tR*0.12,-tR*0.14,tR*0.02,0,0,tR*0.42);
    hg.addColorStop(0,'#fff6d0'); hg.addColorStop(.55,'#f0c74a'); hg.addColorStop(1,'#7a5410');
    ctx.beginPath(); ctx.arc(0,0,tR*0.42,0,TAU); ctx.fillStyle=hg; ctx.fill();
    ctx.restore();

    ctx.restore(); // end rotor
    ctx.restore(); // end translate

    /* ---- BALL (screen frame) ---- */
    const br = R*ballRadFrac;
    const bx = cx + Math.cos(ballAngle)*br;
    const by = cy + Math.sin(ballAngle)*br;
    const rad = Math.max(4,R*F.ballSize);
    const bg = ctx.createRadialGradient(bx-rad*0.35,by-rad*0.4,rad*0.15,bx,by,rad);
    bg.addColorStop(0,'#ffffff'); bg.addColorStop(.55,'#ececf3'); bg.addColorStop(1,'#b7b7c6');
    ctx.beginPath(); ctx.arc(bx,by,rad,0,TAU);
    ctx.fillStyle=bg; ctx.shadowColor='rgba(0,0,0,.55)'; ctx.shadowBlur=rad*1.1; ctx.shadowOffsetY=rad*0.45;
    ctx.fill();
    ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetY=0;
  }

  /* ===== Spin ===== */
  const easeOutQuart = p => 1 - Math.pow(1-p,4);

  function startSpin(){
    if(spinning) return;
    spinning=true; winnerIndex=-1; spinBtn.disabled=true; setResult(null); ensureAudio();

    const target = (riggedIndex!==null) ? riggedIndex : (Math.random()*N|0);

    // ball settles at a RANDOM position each spin (not always the top)
    const ballFinal = Math.random()*TAU;

    // wheel: rotate so the target pocket sits under the ball's resting angle
    const wheelStart = wheelAngle;
    const base = ballFinal - target*STEP;
    let wheelEnd = wheelStart + TAU*(4 + Math.random());
    let diff = (((base - wheelEnd) % TAU) + TAU) % TAU;   // 0..TAU
    wheelEnd += diff;                                     // ≡ base (mod TAU)

    // ball orbits opposite (counter-clockwise) and comes to rest at ballFinal
    const ballStart = ballAngle;
    let ballEnd = ballFinal;
    while(ballEnd > ballStart) ballEnd -= TAU;
    ballEnd -= TAU*(7 + (Math.random()*2|0));

    anim = { t0:performance.now(), dur:6000+Math.random()*800, target, wheelStart, wheelEnd, ballStart, ballEnd };
    lastTickPocket = null;
  }

  function updateSpin(now){
    const p = Math.min(1,(now-anim.t0)/anim.dur);
    const e = easeOutQuart(p);
    wheelAngle = anim.wheelStart + (anim.wheelEnd-anim.wheelStart)*e;
    ballAngle  = anim.ballStart  + (anim.ballEnd -anim.ballStart )*e;

    if(p<0.68){ ballRadFrac=F.ballTrack; }
    else{
      const q=(p-0.68)/0.32, qe=easeOutQuart(q);
      ballRadFrac = F.ballTrack-(F.ballTrack-F.ballRest)*qe + Math.sin(q*Math.PI*3)*0.010*(1-qe);
    }

    const pocket = Math.floor((ballAngle-wheelAngle)/STEP);
    if(pocket!==lastTickPocket){ if(lastTickPocket!==null) tick(1-e); lastTickPocket=pocket; }

    if(p>=1){
      wheelAngle = ((anim.wheelEnd % TAU)+TAU)%TAU;
      ballAngle  = ((anim.ballEnd  % TAU)+TAU)%TAU;
      ballRadFrac = F.ballRest;
      finishSpin(anim.target);
    }
  }

  function finishSpin(target){
    spinning=false; anim=null; winnerIndex=target; riggedIndex=null; spinBtn.disabled=false;
    const v=WHEEL[target];
    setResult(v);
    winChime(colorOf(v));
  }

  function frame(now){
    if(spinning && anim) updateSpin(now);
    if(!spinning && winnerIndex>=0) pulse+=0.08;
    draw();
    requestAnimationFrame(frame);
  }

  /* ===== Result ===== */
  const resultNum=document.getElementById('resultNum');
  const resultMeta=document.getElementById('resultMeta');
  function setResult(v){
    if(v===null){ resultNum.className='num'; resultNum.textContent='…'; resultMeta.innerHTML='Spinning…'; return; }
    const c=colorOf(v);
    resultNum.className='num '+c; resultNum.textContent=String(v);
    resultMeta.innerHTML=`<b>${v} ${c.charAt(0).toUpperCase()+c.slice(1)}</b>`;
  }

  /* ===== THE RIG — silent keyboard override (no visual cue) =====
     Type a number (0, 00, 1-36) OR a word: red / black / green / odd / even,
     then press Enter. Words land on a RANDOM pocket of that category. */
  function randomIndexWhere(pred){
    const idxs=[]; for(let i=0;i<N;i++) if(pred(WHEEL[i])) idxs.push(i);
    return idxs.length ? idxs[(Math.random()*idxs.length)|0] : -1;
  }
  function resolveRig(raw){
    if(raw==='red'||raw==='black'||raw==='green') return randomIndexWhere(v=>colorOf(v)===raw);
    if(raw==='even') return randomIndexWhere(v=>typeof v==='number' && v!==0 && v%2===0);
    if(raw==='odd')  return randomIndexWhere(v=>typeof v==='number' && v%2===1);
    if(/^\d+$/.test(raw)){
      if(raw==='00') return WHEEL.indexOf('00');
      const n=parseInt(raw,10);
      if(n>=0 && n<=36) return WHEEL.indexOf(n);
    }
    return -1;
  }
  window.addEventListener('keydown', e=>{
    const t=e.target;
    if(t && (t.tagName==='INPUT'||t.tagName==='TEXTAREA')) return;
    const k=e.key;
    if(k==='Enter'){ e.preventDefault(); commitRig(); }
    else if(k==='Backspace'){ rigBuffer=rigBuffer.slice(0,-1); e.preventDefault(); }
    else if(k==='Escape'){ rigBuffer=''; riggedIndex=null; }
    else if(k.length===1 && /[a-z0-9]/i.test(k)){
      rigBuffer += k.toLowerCase();
      if(rigBuffer.length>8) rigBuffer = rigBuffer.slice(-8);
      e.preventDefault();
    }
  });
  function commitRig(){
    const raw=rigBuffer.trim(); rigBuffer='';
    if(raw==='') return;
    const idx=resolveRig(raw);
    if(idx>=0) riggedIndex=idx;   // stored silently; consumed by next spin
  }

  /* ===== Audio ===== */
  let audioCtx=null, muted=false, lastTickPocket=null;
  function ensureAudio(){
    if(!audioCtx && !muted){ try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(_){} }
    if(audioCtx && audioCtx.state==='suspended') audioCtx.resume();
  }
  function tone(freq,dur,type,gain,when){
    if(!audioCtx||muted) return;
    const t=when||audioCtx.currentTime;
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type=type||'sine'; o.frequency.value=freq;
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(gain,t+0.006);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g).connect(audioCtx.destination); o.start(t); o.stop(t+dur+0.02);
  }
  function tick(strength){ tone(1500+Math.random()*300,0.03,'square',0.03+0.05*strength); }
  function winChime(color){
    if(!audioCtx||muted) return;
    const base = color==='green'?[523,659,784,1046]:[440,554,659];
    base.forEach((f,i)=>tone(f,0.35,'triangle',0.09,audioCtx.currentTime+i*0.09));
  }
  const muteBtn=document.getElementById('muteBtn');
  muteBtn.addEventListener('click',()=>{ muted=!muted; muteBtn.textContent=muted?'🔇':'🔊'; if(!muted) ensureAudio(); });

  /* ===== Wire up ===== */
  const spinBtn=document.getElementById('spinBtn');
  spinBtn.addEventListener('click',()=>{ ensureAudio(); startSpin(); spinBtn.blur(); });

  window.addEventListener('resize', sizeCanvas);
  if(document.fonts && document.fonts.ready) document.fonts.ready.then(sizeCanvas);

  sizeCanvas();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
